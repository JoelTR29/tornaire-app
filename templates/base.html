<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tornaire MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col font-sans">
    
    <header class="bg-blue-600 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-3">
            
            <a href="/" class="flex items-center gap-2 text-2xl font-extrabold tracking-tight hover:opacity-90 transition">
                <span class="text-3xl">💼</span> Tornaire
            </a>
            
            <nav class="flex items-center gap-2 text-sm sm:text-base">
                <a href="/candidat" class="px-4 py-2 rounded-lg font-medium hover:bg-blue-700 active:bg-blue-800 transition duration-200 flex items-center gap-1.5">
                    <span>👤</span> Candidat
                </a>
                
                <span class="text-blue-400 hidden sm:inline">|</span>
                
                <a href="/empresa" class="px-4 py-2 rounded-lg font-medium bg-blue-700 hover:bg-blue-800 transition duration-200 flex items-center gap-1.5 shadow-sm border border-blue-500/30">
                    <span>🏢</span> Àrea Empresa
                </a>
            </nav>

        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 sm:p-6 max-w-6xl">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-gray-900 text-gray-400 text-center text-sm p-4 border-t border-gray-800 mt-auto">
        <p class="font-medium text-gray-300">Projecte Tornaire &copy; 2026</p>
        <p class="text-xs mt-1 text-gray-500">Treball de Recerca desenvolupat per <span class="text-blue-400">Seth Tornay Rojano</span></p>
    </footer>

</body>
</html>
