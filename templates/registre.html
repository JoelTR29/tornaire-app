{% extends "base.html" %}

{% block content %}
<section class="max-w-md mx-auto py-12">
    <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <span class="text-4xl">🚀</span>
            <h2 class="text-3xl font-bold text-gray-900 mt-3">Crear un compte</h2>
            <p class="text-gray-500 text-sm mt-1">Uneix-te a Tornaire per començar el procés</p>
        </div>

        <form action="/registre" method="post" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2" for="role">Vull registrar-me com a:</label>
                <select id="role" name="role" required onchange="toggleEmpresaField()" class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:border-blue-500 focus:bg-white transition">
                    <option value="candidat">Candidat (Buscar feina)</option>
                    <option value="empresa">Empresa (Publicar ofertes)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2" for="nom">Nom complet</label>
                <input id="nom" name="nom" type="text" required class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:border-blue-500 focus:bg-white transition" placeholder="Seth Tornay">
            </div>

            <div id="empresa-field" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2" for="nom_empresa">Nom de l'Empresa</label>
                <input id="nom_empresa" name="nom_empresa" type="text" class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:border-blue-500 focus:bg-white transition" placeholder="Ex: Tornaire S.L.">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2" for="email">Correu electrònic</label>
                <input id="email" name="email" type="email" required class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:border-blue-500 focus:bg-white transition" placeholder="correu@exemple.com">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2" for="password">Contrasenya</label>
                <input id="password" name="password" type="password" required class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:border-blue-500 focus:bg-white transition" placeholder="Mínim 6 caràcters">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition duration-200">
                Registrar-me
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            Ja tens un compte? <a href="/login" class="text-blue-600 font-semibold hover:underline">Inicia sessió</a>
        </div>
    </div>
</section>

<script>
function toggleEmpresaField() {
    const roleSelect = document.getElementById('role');
    const empresaField = document.getElementById('empresa-field');
    const nomEmpresaInput = document.getElementById('nom_empresa');
    
    if (roleSelect.value === 'empresa') {
        empresaField.classList.remove('hidden');
        nomEmpresaInput.setAttribute('required', 'required');
    } else {
        empresaField.classList.add('hidden');
        nomEmpresaInput.removeAttribute('required');
    }
}
</script>
{% endblock %}
