{% extends "base.html" %}

{% block content %}
<section class="max-w-md mx-auto py-12">
    <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <span class="text-4xl">🔐</span>
            <h2 class="text-3xl font-bold text-gray-900 mt-3">Benvingut de nou</h2>
            <p class="text-gray-500 text-sm mt-1">Introdueix les teves credencials per accedir</p>
        </div>

        {% if error %}
        <div class="mb-5 rounded-2xl border border-red-200 bg-red-50 p-4 text-sm text-red-800">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="post" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2" for="role">Tipus de compte</label>
                <select id="role" name="role" required class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:border-blue-500 focus:bg-white transition">
                    <option value="candidat">Soc un Candidat/a</option>
                    <option value="empresa">Soc una Empresa</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2" for="email">Correu electrònic</label>
                <input id="email" name="email" type="email" required class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:border-blue-500 focus:bg-white transition" placeholder="nom@exemple.com">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2" for="password">Contrasenya</label>
                <input id="password" name="password" type="password" required class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:border-blue-500 focus:bg-white transition" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition duration-200">
                Iniciar Sessió
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            No tens un compte? <a href="/registre" class="text-blue-600 font-semibold hover:underline">Registra't aquí</a>
        </div>
    </div>
</section>
{% endblock %}
